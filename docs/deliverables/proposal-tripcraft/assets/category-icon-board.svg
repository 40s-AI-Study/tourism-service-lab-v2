  <rect x="680" y="66" width="290" height="230" rx="16" fill="url(#c3grad)" stroke="#10b981" stroke-width="1.8" filter="url(#cs)"/>
  <rect x="680" y="66" width="290" height="8" rx="8" fill="#059669"/>
  <rect x="680" y="70" width="290" height="4" fill="#059669"/>

