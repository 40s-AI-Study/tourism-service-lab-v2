  <text x="500" y="490" text-anchor="middle" font-size="9.5" fill="#4c1d95">저밀도 동선 추천</text>
  <line x1="385" y1="500" x2="615" y2="500" stroke="#8b5cf6" stroke-width="0.7" opacity="0.4"/>
  <rect x="385" y="508" width="230" height="14" rx="5" fill="#7c3aed" opacity="0.12"/>
