    <path d="M0,8 Q4,-4 0,-16" stroke="#7c3aed" stroke-width="1.5" fill="none" opacity="0.6"/>
    <path d="M12,10 Q16,-2 12,-14" stroke="#8b5cf6" stroke-width="1.5" fill="none" opacity="0.6"/>
