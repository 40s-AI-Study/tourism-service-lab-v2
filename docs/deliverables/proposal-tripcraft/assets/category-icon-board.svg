    <line x1="50" y1="-20" x2="58" y2="35" stroke="#92400e" stroke-width="3" stroke-linecap="round" opacity="0.8"/>
  </g>

  <text x="500" y="220" text-anchor="middle" font-size="17" font-weight="800" fill="#451a03">미식</text>
