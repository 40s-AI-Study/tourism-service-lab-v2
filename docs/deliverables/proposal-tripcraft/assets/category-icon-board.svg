  <text x="500" y="32" text-anchor="middle" font-size="19" font-weight="700" fill="white" letter-spacing="1">TripCraft Korea — 카테고리 아이콘 보드</text>

  <!-- ===================== CARD 1: 문화유산 ===================== -->
  <rect x="30" y="66" width="290" height="230" rx="16" fill="url(#c1grad)" stroke="#3b82f6" stroke-width="1.8" filter="url(#cs)"/>
  <!-- Top accent bar -->
  <rect x="30" y="66" width="290" height="8" rx="8" fill="#1a56db"/>
  <rect x="30" y="70" width="290" height="4" fill="#1a56db"/>

  <!-- Korean roof icon (기와 지붕) -->
  <g transform="translate(175, 130)">
    <!-- Main roof shape -->
    <path d="M-55,20 Q-40,-10 0,-25 Q40,-10 55,20 Z" fill="#1a56db" opacity="0.75"/>
    <!-- Ridge -->
