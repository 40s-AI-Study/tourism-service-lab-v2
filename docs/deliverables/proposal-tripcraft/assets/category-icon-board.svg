  <text x="175" y="240" text-anchor="middle" font-size="9.5" fill="#1d4ed8">궁궐·고택·비석 역사 탐방</text>
  <text x="175" y="255" text-anchor="middle" font-size="9.5" fill="#1d4ed8">오디오 가이드 자동 재생</text>
