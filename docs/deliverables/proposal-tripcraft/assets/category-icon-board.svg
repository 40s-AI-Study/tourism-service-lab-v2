  <text x="825" y="455" text-anchor="middle" font-size="17" font-weight="800" fill="#500724">포토스팟</text>
  <text x="825" y="475" text-anchor="middle" font-size="9.5" fill="#831843">인스타 감성·일출·야경</text>
  <text x="825" y="490" text-anchor="middle" font-size="9.5" fill="#831843">CLIP 유사도 대안 장소 제안</text>
  <line x1="710" y1="500" x2="940" y2="500" stroke="#ec4899" stroke-width="0.7" opacity="0.4"/>
  <rect x="710" y="508" width="230" height="14" rx="5" fill="#db2777" opacity="0.12"/>
  <text x="825" y="519" text-anchor="middle" font-size="8.5" fill="#500724" font-weight="600">CLIP 임베딩 · photo-contest-winners</text>

  <!-- Footer -->
  <rect x="30" y="565" width="940" height="26" rx="6" fill="white" fill-opacity="0.7" stroke="#e2e8f0" stroke-width="1"/>
  <text x="500" y="582" text-anchor="middle" font-size="9" fill="#6b7280">* 각 카테고리는 contentTypeId 매핑 + 전용 API 조합으로 개인화 플랜 생성. K-컬처 카테고리 (7번째)는 별도 상세 화면에서 제공.</text>
