  <rect x="680" y="320" width="290" height="230" rx="16" fill="url(#c6grad)" stroke="#ec4899" stroke-width="1.8" filter="url(#cs)"/>
  <rect x="680" y="320" width="290" height="8" rx="8" fill="#db2777"/>
