    <!-- Eave tips -->
    <path d="M-55,20 Q-62,18 -58,12" fill="none" stroke="#1a56db" stroke-width="2" opacity="0.6"/>
    <path d="M55,20 Q62,18 58,12" fill="none" stroke="#1a56db" stroke-width="2" opacity="0.6"/>
