    <!-- Lens inner -->
    <circle cx="0" cy="12" r="13" fill="#fce7f3" opacity="0.9"/>
    <circle cx="0" cy="12" r="8" fill="#9d174d" opacity="0.7"/>
    <circle cx="0" cy="12" r="4" fill="#fce7f3" opacity="0.6"/>
    <!-- Flash -->
