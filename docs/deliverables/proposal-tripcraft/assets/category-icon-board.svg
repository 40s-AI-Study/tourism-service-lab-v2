    <ellipse cx="0" cy="15" rx="25" ry="7" fill="#fef3c7" opacity="0.8"/>
    <!-- Steam lines -->
    <path d="M-10,-5 Q-5,-15 -10,-25" stroke="#f59e0b" stroke-width="1.5" fill="none" opacity="0.7"/>
    <path d="M0,-5 Q5,-15 0,-25" stroke="#f59e0b" stroke-width="1.5" fill="none" opacity="0.7"/>
    <path d="M10,-5 Q15,-15 10,-25" stroke="#f59e0b" stroke-width="1.5" fill="none" opacity="0.7"/>
    <!-- Chopsticks -->
