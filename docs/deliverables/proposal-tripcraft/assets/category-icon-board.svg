    <ellipse cx="-16" cy="0" rx="8" ry="15" fill="#ddd6fe" opacity="0.8" transform="rotate(-30,-16,0)"/>
    <ellipse cx="16" cy="0" rx="8" ry="15" fill="#ddd6fe" opacity="0.8" transform="rotate(30,16,0)"/>
    <ellipse cx="-26" cy="8" rx="6" ry="12" fill="#ede9fe" opacity="0.7" transform="rotate(-55,-26,8)"/>
    <ellipse cx="26" cy="8" rx="6" ry="12" fill="#ede9fe" opacity="0.7" transform="rotate(55,26,8)"/>
