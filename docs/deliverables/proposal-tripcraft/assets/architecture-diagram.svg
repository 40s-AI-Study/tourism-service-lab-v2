  <text x="60" y="654" font-size="9" fill="#6b7280">*총 12종 한국관광공사 API + 카카오 4종 + 네이버 + 국세청 = 외부 API 18종 활용</text>
  <text x="60" y="668" font-size="9" fill="#6b7280">*Chroma 벡터 DB: 26만건 관광지 텍스트+이미지 임베딩 오프라인 사전 배치, 실시간 코사인 유사도 검색</text>
  <text x="60" y="682" font-size="9" fill="#6b7280">*Redis 다층 캐시: TTL 30분(위치) / 6시간(검색) / 24시간(빅데이터) / 7일(이미지/오디오) — API 호출 비용 최소화</text>
</svg>
