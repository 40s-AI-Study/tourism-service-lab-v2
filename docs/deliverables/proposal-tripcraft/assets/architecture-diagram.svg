  <line x1="365" y1="362" x2="365" y2="520" stroke="#6b7280" stroke-width="1" stroke-dasharray="4,3" opacity="0.5"/>
  <line x1="785" y1="362" x2="785" y2="520" stroke="#6b7280" stroke-width="1" stroke-dasharray="4,3" opacity="0.5"/>
  <line x1="1010" y1="362" x2="1010" y2="520" stroke="#6b7280" stroke-width="1" stroke-dasharray="4,3" opacity="0.5"/>

  <!-- Legend -->
