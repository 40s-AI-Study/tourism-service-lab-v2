  <text x="250" y="562" text-anchor="middle" font-size="8" fill="#991b1b">audio-guide · visitor-forecast · big-data · related · diversity...</text>

  <!-- Kakao block -->
  <rect x="380" y="522" width="250" height="44" rx="7" fill="white" stroke="#ef4444" stroke-width="1.2"/>
  <rect x="380" y="522" width="250" height="44" rx="7" fill="#ef4444" opacity="0.1"/>
  <rect x="394" y="530" width="28" height="28" rx="14" fill="#fee500"/>
  <text x="408" y="548" text-anchor="middle" font-size="8" fill="#3c1e1e" font-weight="700">K</text>
  <text x="505" y="535" text-anchor="middle" font-size="10" font-weight="700" fill="#7f1d1d">카카오 OpenAPI 4종</text>
  <text x="505" y="550" text-anchor="middle" font-size="8.5" fill="#7f1d1d">맵 · 로그인 · 공유 · 모빌리티</text>
  <text x="505" y="562" text-anchor="middle" font-size="8" fill="#991b1b">일 300,000건 무료</text>

