  <text x="155" y="321" text-anchor="middle" font-size="8.5" fill="#065f46">Chroma 벡터 검색</text>
  <text x="155" y="334" text-anchor="middle" font-size="8.5" fill="#065f46">소셜 트렌드 파싱</text>

  <rect x="270" y="280" width="190" height="64" rx="7" fill="white" stroke="#10b981" stroke-width="1.2"/>
  <rect x="270" y="280" width="190" height="14" rx="7" fill="#10b981"/>
  <rect x="270" y="287" width="190" height="7" rx="0" fill="#10b981"/>
  <text x="365" y="291" text-anchor="middle" font-size="9.5" font-weight="700" fill="white">동선 최적화 엔진</text>
