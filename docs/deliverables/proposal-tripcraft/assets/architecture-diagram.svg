  <text x="1000" y="550" text-anchor="middle" font-size="8.5" fill="#7f1d1d">스탬프 영수증 OCR 검증</text>
  <text x="1000" y="562" text-anchor="middle" font-size="8" fill="#991b1b">무제한 무료</text>

