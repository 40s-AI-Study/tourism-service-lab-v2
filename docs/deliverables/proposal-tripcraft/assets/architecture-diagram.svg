  <text x="66" y="513" font-size="11" font-weight="700" fill="#7f1d1d" letter-spacing="0.5">외부 API 레이어</text>

  <!-- KTO block -->
  <rect x="60" y="522" width="300" height="44" rx="7" fill="white" stroke="#ef4444" stroke-width="1.2"/>
  <rect x="60" y="522" width="300" height="44" rx="7" fill="#ef4444" opacity="0.1"/>
