  <rect x="40" y="252" width="1120" height="110" rx="10" fill="url(#serviceGrad)" stroke="#10b981" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="66" y="273" font-size="11" font-weight="700" fill="#065f46" letter-spacing="0.5">서비스 레이어</text>

