  <rect x="600" y="85" width="160" height="34" rx="6" fill="#3b82f6" opacity="0.2"/>
  <text x="680" y="106" text-anchor="middle" font-size="11" fill="#1e40af" font-weight="600">AI 코스 생성 요청</text>

  <rect x="780" y="85" width="160" height="34" rx="6" fill="#3b82f6" opacity="0.2"/>
