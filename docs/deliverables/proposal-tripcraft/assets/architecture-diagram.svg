  <text x="1010" y="321" text-anchor="middle" font-size="8.5" fill="#065f46">국세청 영수증 OCR 검증</text>
  <text x="1010" y="334" text-anchor="middle" font-size="8.5" fill="#065f46">리워드 포인트 산출</text>

