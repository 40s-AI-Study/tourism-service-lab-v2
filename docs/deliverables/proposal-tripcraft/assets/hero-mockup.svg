    <line x1="512" y1="512" x2="512" y2="492" stroke="white" stroke-width="1.8" opacity="0.7"/>
    <line x1="519" y1="514" x2="533" y2="498" stroke="white" stroke-width="1.8" opacity="0.7"/>
    <line x1="520" y1="520" x2="540" y2="520" stroke="white" stroke-width="1.8" opacity="0.7"/>
    <line x1="519" y1="526" x2="533" y2="542" stroke="white" stroke-width="1.8" opacity="0.7"/>
    <line x1="505" y1="514" x2="491" y2="498" stroke="white" stroke-width="1.8" opacity="0.7"/>
    <line x1="504" y1="520" x2="484" y2="520" stroke="white" stroke-width="1.8" opacity="0.7"/>
    <line x1="505" y1="526" x2="491" y2="542" stroke="white" stroke-width="1.8" opacity="0.7"/>
    <circle cx="512" cy="492" r="3" fill="#fbbf24" opacity="0.9"/>
    <circle cx="533" cy="498" r="3" fill="#fef3c7" opacity="0.9"/>
    <circle cx="540" cy="520" r="3" fill="#fbbf24" opacity="0.9"/>
