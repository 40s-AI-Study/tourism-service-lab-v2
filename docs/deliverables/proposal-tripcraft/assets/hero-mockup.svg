    <rect x="135" y="462" width="240" height="130" rx="16" fill="url(#cat3g)" filter="url(#cardSh)"/>
    <circle cx="330" cy="462" r="65" fill="white" opacity="0.07"/>
    <!-- Mountain -->
    <path d="M175,555 L210,505 L245,555 Z" fill="white" opacity="0.25"/>
