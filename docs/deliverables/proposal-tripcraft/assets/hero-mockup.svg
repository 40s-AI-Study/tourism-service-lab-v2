    <rect x="148" y="872" width="176" height="10" rx="5" fill="#059669"/>
    <text x="148" y="898" font-size="11" fill="#64748b">방문 완료: 6/17 시도</text>
    <text x="648" y="898" text-anchor="end" font-size="11" font-weight="700" fill="#059669">35%</text>

