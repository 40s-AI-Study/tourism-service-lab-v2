    <text x="650" y="308" text-anchor="end" font-size="11" fill="#64748b">전체 보기 ›</text>

    <!-- ===== Category cards grid (2 cols, 3 rows) ===== -->

    <!-- Row 1 -->
    <!-- Card: 문화유산 -->
    <rect x="135" y="318" width="240" height="130" rx="16" fill="url(#cat1g)" filter="url(#cardSh)"/>
    <!-- Decorative shape -->
    <circle cx="330" cy="318" r="70" fill="white" opacity="0.07"/>
    <!-- Roof icon -->
    <path d="M195,370 Q215,350 235,345 Q255,350 275,370 Z" fill="white" opacity="0.35"/>
    <rect x="220" y="370" width="12" height="20" rx="2" fill="white" opacity="0.3"/>
    <rect x="242" y="370" width="12" height="20" rx="2" fill="white" opacity="0.3"/>
    <rect x="205" y="388" width="60" height="6" rx="2" fill="white" opacity="0.25"/>
    <!-- Texts -->
    <text x="155" y="425" font-size="15" font-weight="800" fill="white">문화유산</text>
    <text x="155" y="442" font-size="9" fill="white" opacity="0.85">오디오 자동재생</text>

    <!-- Card: 미식 -->
    <rect x="392" y="318" width="240" height="130" rx="16" fill="url(#cat2g)" filter="url(#cardSh)"/>
    <circle cx="580" cy="310" r="65" fill="white" opacity="0.07"/>
    <!-- Bowl icon -->
    <path d="M452,372 Q470,390 512,392 Q554,390 572,372 Z" fill="white" opacity="0.3"/>
    <ellipse cx="512" cy="372" rx="60" ry="14" fill="white" opacity="0.2"/>
    <path d="M500,352 Q496,340 500,330" stroke="white" stroke-width="1.5" fill="none" opacity="0.5"/>
    <path d="M512,350 Q508,338 512,328" stroke="white" stroke-width="1.5" fill="none" opacity="0.5"/>
    <path d="M524,352 Q528,340 524,330" stroke="white" stroke-width="1.5" fill="none" opacity="0.5"/>
    <text x="412" y="425" font-size="15" font-weight="800" fill="white">미식</text>
    <text x="412" y="442" font-size="9" fill="white" opacity="0.85">향토 음식 발굴</text>

