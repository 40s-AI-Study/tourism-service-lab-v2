    <!-- App title -->
    <text x="400" y="155" text-anchor="middle" font-size="26" font-weight="900" fill="white" letter-spacing="0.5">TripCraft Korea</text>
    <text x="400" y="178" text-anchor="middle" font-size="12.5" fill="white" opacity="0.8" letter-spacing="0.3">카테고리 테마 여행 플래너</text>

    <!-- Tagline pill -->
