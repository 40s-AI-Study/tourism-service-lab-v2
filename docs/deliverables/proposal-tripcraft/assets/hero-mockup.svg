<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 800 1200" xmlns="http://www.w3.org/2000/svg" font-family="Noto Sans KR, -apple-system, system-ui, sans-serif">
  <defs>
    <linearGradient id="pageBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0f9ff"/>
      <stop offset="100%" stop-color="#f8fafc"/>
    </linearGradient>
    <linearGradient id="appHeader" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f2d6e"/>
      <stop offset="60%" stop-color="#1a56db"/>
      <stop offset="100%" stop-color="#1d6fb5"/>
    </linearGradient>
    <linearGradient id="frameShadow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#334155"/>
    </linearGradient>
    <linearGradient id="cat1g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a56db"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="cat2g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d97706"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="cat3g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
    <linearGradient id="cat4g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#dc2626"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
    <linearGradient id="cat5g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="cat6g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#db2777"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <linearGradient id="tabBarBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f8fafc"/>
    </linearGradient>
    <filter id="phoneShadow">
      <feDropShadow dx="0" dy="12" stdDeviation="24" flood-color="#0f172a" flood-opacity="0.28"/>
    </filter>
    <filter id="cardSh">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#00000018"/>
    </filter>
    <clipPath id="screenClip">
      <rect x="113" y="100" width="574" height="1000" rx="0"/>
    </clipPath>
    <clipPath id="phoneClip">
      <rect x="98" y="60" width="604" height="1088" rx="52"/>
    </clipPath>
  </defs>

  <!-- Page background -->
  <rect width="800" height="1200" fill="url(#pageBg)"/>

  <!-- Decorative background blobs -->
  <circle cx="120" cy="200" r="180" fill="#dbeafe" opacity="0.3"/>
  <circle cx="700" cy="900" r="160" fill="#d1fae5" opacity="0.25"/>
  <circle cx="680" cy="180" r="120" fill="#fef3c7" opacity="0.2"/>

  <!-- ===== iPhone frame ===== -->
  <!-- Outer shadow frame -->
