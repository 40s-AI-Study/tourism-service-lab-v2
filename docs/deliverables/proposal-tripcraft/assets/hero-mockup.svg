      <text x="232" y="21" text-anchor="middle" font-size="7.5" fill="#94a3b8">대구</text>
      <circle cx="268" cy="16" r="13" fill="none" stroke="#cbd5e1" stroke-width="1.5"/>
      <text x="268" y="21" text-anchor="middle" font-size="7.5" fill="#94a3b8">대전</text>
      <circle cx="304" cy="16" r="13" fill="none" stroke="#cbd5e1" stroke-width="1.5"/>
      <text x="304" y="21" text-anchor="middle" font-size="7.5" fill="#94a3b8">광주</text>
      <circle cx="340" cy="16" r="13" fill="none" stroke="#cbd5e1" stroke-width="1.5"/>
      <text x="340" y="21" text-anchor="middle" font-size="7.5" fill="#94a3b8">인천</text>
      <circle cx="376" cy="16" r="13" fill="none" stroke="#cbd5e1" stroke-width="1.5"/>
      <text x="376" y="21" text-anchor="middle" font-size="7.5" fill="#94a3b8">수원</text>
      <circle cx="412" cy="16" r="13" fill="none" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="3,2"/>
      <text x="412" y="21" text-anchor="middle" font-size="8" fill="#c7d2da">+6</text>
    </g>

    <!-- ===== Tab bar ===== -->
    <rect x="98" y="1005" width="604" height="100" fill="url(#tabBarBg)"/>
    <!-- Separator line -->
    <line x1="98" y1="1005" x2="702" y2="1005" stroke="#e2e8f0" stroke-width="1"/>

    <!-- Tab: 홈 (active) -->
    <rect x="133" y="1015" width="80" height="60" rx="8" fill="#eff6ff"/>
    <!-- Home icon -->
