    <text x="400" y="207" text-anchor="middle" font-size="10.5" fill="white" font-weight="600">혼잡도 · 오디오 · 경비 · 스탬프 올인원</text>

    <!-- Search bar -->
    <rect x="135" y="228" width="530" height="44" rx="22" fill="white" opacity="0.95"/>
    <circle cx="168" cy="250" r="10" fill="none" stroke="#94a3b8" stroke-width="2"/>
    <line x1="175" y1="257" x2="181" y2="263" stroke="#94a3b8" stroke-width="2" stroke-linecap="round"/>
    <text x="195" y="255" font-size="13" fill="#94a3b8">어디로 여행을 떠나실 건가요?</text>
    <!-- mic icon -->
    <rect x="632" y="237" width="22" height="28" rx="6" fill="none" stroke="#64748b" stroke-width="1.5" opacity="0.6"/>
    <line x1="643" y1="265" x2="643" y2="272" stroke="#64748b" stroke-width="1.5" opacity="0.6"/>

    <!-- Section title -->
