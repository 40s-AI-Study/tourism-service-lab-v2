    <ellipse cx="218" cy="690" rx="9" ry="16" fill="white" opacity="0.25" transform="rotate(-25,218,690)"/>
    <ellipse cx="252" cy="690" rx="9" ry="16" fill="white" opacity="0.25" transform="rotate(25,252,690)"/>
    <circle cx="235" cy="680" r="6" fill="white" opacity="0.6"/>
    <ellipse cx="235" cy="706" rx="28" ry="7" fill="white" opacity="0.2"/>
    <text x="155" y="716" font-size="15" font-weight="800" fill="white">힐링/웰니스</text>
    <text x="155" y="733" font-size="9" fill="white" opacity="0.85">저밀도 온천·명상 코스</text>

    <!-- Card: 포토스팟 -->
    <rect x="392" y="606" width="240" height="130" rx="16" fill="url(#cat6g)" filter="url(#cardSh)"/>
