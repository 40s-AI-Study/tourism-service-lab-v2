      <text x="16" y="21" text-anchor="middle" font-size="7.5" fill="white" font-weight="700">서울</text>
      <circle cx="52" cy="16" r="13" fill="#059669" opacity="0.9"/>
      <text x="52" y="21" text-anchor="middle" font-size="7.5" fill="white" font-weight="700">경주</text>
      <circle cx="88" cy="16" r="13" fill="#d97706" opacity="0.9"/>
      <text x="88" y="21" text-anchor="middle" font-size="7.5" fill="white" font-weight="700">전주</text>
      <circle cx="124" cy="16" r="13" fill="#7c3aed" opacity="0.9"/>
      <text x="124" y="21" text-anchor="middle" font-size="7.5" fill="white" font-weight="700">강릉</text>
      <circle cx="160" cy="16" r="13" fill="#dc2626" opacity="0.9"/>
      <text x="160" y="21" text-anchor="middle" font-size="7.5" fill="white" font-weight="700">제주</text>
      <circle cx="196" cy="16" r="13" fill="#0891b2" opacity="0.9"/>
      <text x="196" y="21" text-anchor="middle" font-size="7.5" fill="white" font-weight="700">부산</text>
