    <text x="173" y="1074" text-anchor="middle" font-size="10.5" font-weight="700" fill="#1a56db">홈</text>

    <!-- Tab: 지도 -->
    <rect x="263" y="1015" width="80" height="60" rx="8" fill="none"/>
    <circle cx="303" cy="1038" r="10" fill="none" stroke="#94a3b8" stroke-width="1.8"/>
    <circle cx="303" cy="1038" r="4" fill="#94a3b8" opacity="0.7"/>
    <path d="M303,1048 L299,1057 L303,1053 L307,1057 Z" fill="#94a3b8" opacity="0.7"/>
    <text x="303" y="1074" text-anchor="middle" font-size="10.5" fill="#94a3b8">지도</text>

    <!-- Tab: 스탬프 -->
    <rect x="393" y="1015" width="80" height="60" rx="8" fill="none"/>
    <circle cx="433" cy="1038" r="12" fill="none" stroke="#94a3b8" stroke-width="1.8"/>
    <text x="433" y="1043" text-anchor="middle" font-size="9" fill="#94a3b8" font-weight="700">팔도</text>
    <text x="433" y="1074" text-anchor="middle" font-size="10.5" fill="#94a3b8">스탬프</text>

    <!-- Tab: 마이 -->
    <rect x="523" y="1015" width="80" height="60" rx="8" fill="none"/>
    <circle cx="563" cy="1033" r="9" fill="none" stroke="#94a3b8" stroke-width="1.8"/>
    <path d="M545,1058 Q545,1043 563,1043 Q581,1043 581,1058" fill="none" stroke="#94a3b8" stroke-width="1.8"/>
    <text x="563" y="1074" text-anchor="middle" font-size="10.5" fill="#94a3b8">마이</text>

    <!-- Home indicator bar -->
    <rect x="300" y="1092" width="200" height="5" rx="2.5" fill="#1e293b" opacity="0.2"/>

  </g>

  <!-- ===== Labels outside phone ===== -->
  <!-- Left callout: AI 코스 생성 -->
  <line x1="98" y1="400" x2="50" y2="400" stroke="#1a56db" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.6"/>
  <rect x="10" y="383" width="42" height="34" rx="6" fill="#1a56db" fill-opacity="0.1" stroke="#1a56db" stroke-width="1" stroke-opacity="0.4"/>
  <text x="31" y="398" text-anchor="middle" font-size="8.5" fill="#1a56db" font-weight="700">AI 코스</text>
  <text x="31" y="411" text-anchor="middle" font-size="8.5" fill="#1a56db" font-weight="700">생성</text>

  <!-- Right callout: 혼잡도 -->
  <line x1="702" y1="510" x2="748" y2="510" stroke="#d97706" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.6"/>
  <rect x="748" y="494" width="42" height="34" rx="6" fill="#d97706" fill-opacity="0.1" stroke="#d97706" stroke-width="1" stroke-opacity="0.4"/>
  <text x="769" y="509" text-anchor="middle" font-size="8.5" fill="#d97706" font-weight="700">혼잡도</text>
  <text x="769" y="522" text-anchor="middle" font-size="8.5" fill="#d97706" font-weight="700">실시간</text>

