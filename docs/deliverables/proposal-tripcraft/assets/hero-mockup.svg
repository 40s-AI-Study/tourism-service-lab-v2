  <!-- Phone body -->
  <rect x="103" y="65" width="594" height="1078" rx="50" fill="#1e293b"/>

  <!-- Screen area -->
  <rect x="113" y="78" width="574" height="1052" rx="42" fill="white"/>

  <!-- ===== SCREEN CONTENT ===== -->
  <g clip-path="url(#phoneClip)">

    <!-- ===== Header gradient ===== -->
    <rect x="98" y="60" width="604" height="295" fill="url(#appHeader)"/>

    <!-- Status bar -->
    <text x="160" y="112" font-size="13" fill="white" opacity="0.9" font-weight="600">9:41</text>
    <!-- Signal/wifi/battery icons -->
    <rect x="528" y="102" width="22" height="11" rx="3" fill="white" opacity="0.7"/>
    <rect x="529" y="103" width="18" height="9" rx="2" fill="white" opacity="0.9"/>
    <rect x="551" y="105" width="3" height="5" rx="1" fill="white" opacity="0.5"/>
    <circle cx="510" cy="107" r="5" fill="none" stroke="white" stroke-width="1.5" opacity="0.7"/>
    <circle cx="510" cy="107" r="2.5" fill="white" opacity="0.5"/>
    <circle cx="493" cy="107" r="1.5" fill="white" opacity="0.9"/>
    <circle cx="487" cy="107" r="1.5" fill="white" opacity="0.6"/>
    <circle cx="481" cy="107" r="1.5" fill="white" opacity="0.35"/>

    <!-- Dynamic island / notch -->
    <rect x="295" y="76" width="210" height="34" rx="17" fill="#0f172a"/>

    <!-- App logo area -->
