<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <title>프로토타입 뷰어 — Tourism Service Lab</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root{
      --bg:#0b0d12; --panel:#11151c; --side:#0f1218; --line:#1c2230;
      --fg:#e8edf5; --muted:#8893a7; --accent:#5b9cff; --accent2:#3b6fbf;
      --btn:#1a2233; --btn-hover:#243049; --btn-disabled:#161b25;
      --pill:#1a2233; --pill-r1:#3a2a52; --pill-r3:#1d3a4a; --pill-r4:#3a3424; --pill-r7:#1f3a2a;
      --hover:#1a2030;
    }
    *{box-sizing:border-box}
    html,body{margin:0;padding:0;background:var(--bg);color:var(--fg);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Apple SD Gothic Neo","Noto Sans KR",sans-serif}
    body{display:flex;flex-direction:column;height:100vh;overflow:hidden}
    header{flex:0 0 auto;background:var(--panel);border-bottom:1px solid var(--line);padding:10px 14px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
    .title{font-weight:600;font-size:14px}
    .title .sub{color:var(--muted);font-weight:400;margin-left:6px;font-size:12px}
    .spacer{flex:1}
    button, select, a.btn{
      background:var(--btn);color:var(--fg);border:1px solid var(--line);
      padding:7px 12px;border-radius:8px;font-size:13px;cursor:pointer;
      text-decoration:none;line-height:1;display:inline-flex;align-items:center;gap:6px;
    }
    button:hover, a.btn:hover{background:var(--btn-hover)}
    button:disabled{background:var(--btn-disabled);color:var(--muted);cursor:not-allowed}
    .counter{font-variant-numeric:tabular-nums;color:var(--muted);font-size:13px;min-width:64px;text-align:center}
    .pos{color:var(--accent);font-weight:600}
    .layout{flex:1 1 auto;display:flex;min-height:0}
    aside{
      width:300px;flex:0 0 auto;background:var(--side);border-right:1px solid var(--line);
      overflow-y:auto;padding:8px 0;font-size:13px;
    }
    .group-toolbar{display:flex;gap:6px;padding:6px 12px 10px;flex-wrap:wrap;border-bottom:1px solid var(--line);margin-bottom:6px}
    .toggle{font-size:11px;padding:4px 8px;border-radius:14px;cursor:pointer;border:1px solid var(--line);color:var(--muted);user-select:none}
    .toggle.on{background:var(--accent);border-color:var(--accent);color:#fff}
    .group{margin:4px 0}
    .group-title{
      padding:8px 14px 6px;color:var(--muted);font-size:11px;letter-spacing:.6px;text-transform:uppercase;font-weight:600;
      display:flex;align-items:center;gap:8px;
    }
    .group-count{color:var(--accent);font-weight:700}
    .item{
      display:block;padding:8px 14px;border-left:3px solid transparent;cursor:pointer;
      color:var(--fg);text-decoration:none;line-height:1.35;
    }
    .item:hover{background:var(--hover)}
    .item.active{background:var(--hover);border-left-color:var(--accent)}
    .item .row1{display:flex;align-items:center;gap:6px;margin-bottom:2px}
    .item .num{font-variant-numeric:tabular-nums;color:var(--muted);font-size:11px;min-width:22px;font-weight:600}
    .item .pill{font-size:10px;padding:2px 6px;border-radius:10px;background:var(--pill);color:var(--muted);font-weight:600;letter-spacing:.4px}
    .pill.r1{background:var(--pill-r1);color:#d6c2ee}
    .pill.r3{background:var(--pill-r3);color:#a6d2e8}
    .pill.r4{background:var(--pill-r4);color:#e6d399}
    .pill.r7{background:var(--pill-r7);color:#a6e0bb}
    .item .label{font-size:13px;color:#d8dde8;line-height:1.3}
    .item .desc{font-size:11px;color:var(--muted);margin-top:2px;line-height:1.35}
    .item.active .label{color:var(--fg);font-weight:600}
    main{flex:1 1 auto;position:relative;background:#000;display:flex;flex-direction:column;min-width:0}
    .meta-bar{
      flex:0 0 auto;padding:10px 16px;background:var(--panel);border-bottom:1px solid var(--line);
      display:flex;align-items:center;gap:10px;flex-wrap:wrap;font-size:13px;
    }
    .meta-title{font-weight:600}
    .meta-cat{color:var(--muted);font-size:12px}
    iframe{flex:1 1 auto;width:100%;border:0;display:block;background:#fff}
    .hint{position:absolute;left:12px;bottom:12px;background:rgba(0,0,0,.55);color:#cfd6e4;padding:6px 10px;border-radius:8px;font-size:12px;backdrop-filter:blur(6px)}
    .kbd{display:inline-block;border:1px solid #3a4458;border-bottom-width:2px;padding:0 6px;border-radius:4px;font-size:11px;color:#cfd6e4;background:#1a2030;margin:0 2px}
    @media(max-width:820px){
      aside{position:absolute;z-index:5;left:0;top:0;bottom:0;transform:translateX(-100%);transition:transform .2s}
      aside.open{transform:translateX(0);box-shadow:8px 0 24px rgba(0,0,0,.5)}
    }
  </style>
</head>
<body>
  <header>
    <button id="btnSide" title="목록" style="display:none">☰</button>
    <span class="title">프로토타입 뷰어<span class="sub">Tourism Service Lab · 25 ideas</span></span>
    <button id="btnPrev" title="이전 (←)">◀</button>
    <span class="counter"><span id="pos" class="pos">1</span> / <span id="total">0</span></span>
    <button id="btnNext" title="다음 (→)">▶</button>
    <span class="spacer"></span>
    <a id="openDirect" class="btn" target="_blank" rel="noopener" href="#">↗ 새 탭</a>
    <a class="btn" href="index.html">⛶ 그리드</a>
  </header>
  <div class="layout">
    <aside id="aside">
      <div class="group-toolbar" id="filters"></div>
      <div id="list"></div>
    </aside>
    <main>
      <div class="meta-bar">
        <span class="meta-title" id="metaTitle">—</span>
        <span class="meta-cat" id="metaCat"></span>
        <span class="spacer"></span>
        <span class="meta-cat" id="metaSlug"></span>
      </div>
      <iframe id="frame" src="about:blank" referrerpolicy="no-referrer"></iframe>
      <div class="hint">
        <span class="kbd">←</span><span class="kbd">→</span> 이전/다음 ·
        <span class="kbd">Home</span> 처음 ·
        <span class="kbd">End</span> 끝
      </div>
    </main>
  </div>

  <script>
    // 카테고리: A 발견/로컬, B 스토리/콘텐츠, C 데이터/실시간/식음, D 자연/생태/웰니스,
    // E 문화/전통, F 경로/AI매칭, G 외국인/접근성, H 특수목적
    const CATS = {
      A:{label:"🗝️ 발견/로컬 숨은명소", color:"#5b9cff"},
      B:{label:"🎧 스토리/콘텐츠",       color:"#c39bff"},
      C:{label:"📊 데이터/실시간/식음",  color:"#ffb547"},
      D:{label:"🌿 자연/생태/웰니스",    color:"#7be0a3"},
      E:{label:"🏛️ 문화/전통",         color:"#ff8a8a"},
      F:{label:"🧭 경로/AI매칭",         color:"#5bd0d8"},
      G:{label:"🌍 외국인/접근성",       color:"#ffa3d2"},
      H:{label:"⭐ 특수목적(펫·시니어·노마드)", color:"#d4d4d4"},
    };
    const ROUNDS = {
      "1-2":{label:"Round 1-2", pill:"r1"},
      "3":  {label:"Round 3",   pill:"r3"},
      "4":  {label:"Round 4",   pill:"r4"},
      "7":  {label:"Round 7",   pill:"r7"},
    };

    // 25 prototypes — slug, ko 이름, 한 줄 설명, round, category
    const PROTOTYPES = [
      // Round 1-2 (12)
      {slug:"koreapath-ai",          name:"KoreaPath AI",          desc:"개인화 동선 자동 생성 · 혼잡도 최적화",   round:"1-2", cat:"F"},
      {slug:"audio-story-korea",     name:"Audio Story Korea",     desc:"몰입형 문화재 오디오 스토리텔링",          round:"1-2", cat:"B"},
      {slug:"k-local-explorer",      name:"K-Local Explorer",      desc:"지역 특화 숨은 명소 발굴",                 round:"1-2", cat:"A"},
      {slug:"korea-trend-radar",     name:"KoreaTrend Radar",      desc:"실시간 관광 빅데이터 핫플 레이더",         round:"1-2", cat:"C"},
      {slug:"eco-trail-korea",       name:"EcoTrail Korea",        desc:"친환경 트레킹·자전거·생태관광",            round:"1-2", cat:"D"},
      {slug:"pet-korea",             name:"PetKorea",              desc:"반려동물 동반 여행 올인원",                round:"1-2", cat:"H"},
      {slug:"korea-festival-live",   name:"KoreaFestival Live",    desc:"실시간 축제·이벤트 여행 레이더",           round:"1-2", cat:"C"},
      {slug:"taste-data-korea",      name:"TasteData Korea",       desc:"빅데이터 로컬 미식 큐레이터",              round:"1-2", cat:"C"},
      {slug:"photo-hunt-korea",      name:"PhotoHunt Korea",       desc:"AI 포토 스팟 큐레이터 & 포토 투어",        round:"1-2", cat:"B"},
      {slug:"korea-work-wander",     name:"KoreaWork & Wander",    desc:"디지털 노마드 워케이션 인텔리전스",        round:"1-2", cat:"H"},
      {slug:"korea-demand-atlas",    name:"KoreaDemand Atlas",     desc:"관광 수요 강도 기반 지역 발굴",            round:"1-2", cat:"C"},
      {slug:"silver-trail-korea",    name:"SilverTrail Korea",     desc:"액티브 시니어 슬로우 트래블",              round:"1-2", cat:"H"},

      // Round 7 (10)
      {slug:"round7-k-culture-deep-dive",     name:"K-Culture Deep Dive",      desc:"팬덤이 걷는 K-팝·드라마 성지순례",   round:"7", cat:"E"},
      {slug:"round7-hidden-gem-scout",        name:"Hidden Gem Scout",         desc:"KTO 강소형 데이터로 숨은 한국 발굴", round:"7", cat:"A"},
      {slug:"round7-mood-travel-matcher",     name:"Mood Travel Matcher",      desc:"감정이 곧 목적지 — 무드 매칭",       round:"7", cat:"F"},
      {slug:"round7-foreign-ai-guide",        name:"Foreign AI Guide",         desc:"세계 어디서든 AI 현지 가이드",       round:"7", cat:"G"},
      {slug:"round7-ugc-hidden-spot",         name:"UGC Hidden Spot",          desc:"AI 바이럴 명소 탐지",                round:"7", cat:"A"},
      {slug:"round7-eco-trail-explorer",      name:"Eco Trail Explorer",       desc:"생태관광 코스 (R7)",                 round:"7", cat:"D"},
      {slug:"round7-barrier-free-journey",    name:"Barrier-Free Journey",     desc:"무장애 여행 (R7)",                   round:"7", cat:"G"},
      {slug:"round7-traditional-experience",  name:"Traditional Experience",   desc:"한국 전통문화 체험 예약",            round:"7", cat:"E"},
      {slug:"round7-hidden-restaurant-finder",name:"Hidden Restaurant Finder", desc:"숨은 맛집 (R7)",                     round:"7", cat:"C"},
      {slug:"round7-crowd-free-alternative",  name:"Crowd-Free Alternative",   desc:"혼잡 회피 대안 추천",                round:"7", cat:"F"},

      // Round 3 (3)
      {slug:"round3-healing-journey",  name:"치유여정 Korea",          desc:"번아웃을 위한 감성 치유 여행",    round:"3", cat:"D"},
      {slug:"round3-localsecret-v2",   name:"LocalSecret v2",         desc:"현지인 추천 숨은 명소 (R3)",      round:"3", cat:"A"},
      {slug:"round3-audio-story-v2",   name:"Audio Story Korea v2",   desc:"오디오 스토리텔링 v2 (R3)",       round:"3", cat:"B"},
    ];

    const frame = document.getElementById("frame");
    const posEl = document.getElementById("pos");
    const totalEl = document.getElementById("total");
    const btnPrev = document.getElementById("btnPrev");
    const btnNext = document.getElementById("btnNext");
    const btnSide = document.getElementById("btnSide");
    const aside = document.getElementById("aside");
    const list = document.getElementById("list");
    const filters = document.getElementById("filters");
    const openDirect = document.getElementById("openDirect");
    const metaTitle = document.getElementById("metaTitle");
    const metaCat = document.getElementById("metaCat");
    const metaSlug = document.getElementById("metaSlug");

    // grouping
    const GROUP_BY = "cat"; // 'cat' or 'round'
    let activeFilters = new Set(Object.keys(CATS));

    function visiblePrototypes(){
      return PROTOTYPES.filter(p => activeFilters.has(p.cat));
    }

    function renderFilters(){
      filters.innerHTML = "";
      const all = document.createElement("span");
      all.className = "toggle on";
      all.textContent = "전체";
      all.addEventListener("click", () => {
        activeFilters = new Set(Object.keys(CATS));
        renderFilters(); renderList(); ensureValidIndex();
      });
      filters.appendChild(all);
      Object.entries(CATS).forEach(([key, info]) => {
        const t = document.createElement("span");
        t.className = "toggle" + (activeFilters.has(key) ? " on" : "");
        t.textContent = info.label;
        t.title = info.label;
        t.addEventListener("click", () => {
          if (activeFilters.has(key) && activeFilters.size === Object.keys(CATS).length) {
            // first click on a single → exclusive
            activeFilters = new Set([key]);
          } else if (activeFilters.has(key)) {
            activeFilters.delete(key);
            if (activeFilters.size === 0) activeFilters.add(key);
          } else {
            activeFilters.add(key);
          }
          renderFilters(); renderList(); ensureValidIndex();
        });
        filters.appendChild(t);
      });
      all.classList.toggle("on", activeFilters.size === Object.keys(CATS).length);
    }

    function renderList(){
      list.innerHTML = "";
      const visible = visiblePrototypes();
      totalEl.textContent = visible.length;
      const groups = {};
      visible.forEach(p => { (groups[p.cat] ||= []).push(p); });
      Object.keys(CATS).forEach(catKey => {
        const items = groups[catKey];
        if (!items || items.length === 0) return;
        const group = document.createElement("div");
        group.className = "group";
        const gt = document.createElement("div");
        gt.className = "group-title";
        gt.innerHTML = `<span>${CATS[catKey].label}</span><span class="group-count">${items.length}</span>`;
        group.appendChild(gt);
        items.forEach(p => {
          const idx = PROTOTYPES.indexOf(p);
          const visIdx = visible.indexOf(p);
          const a = document.createElement("a");
          a.className = "item";
          a.dataset.idx = String(idx);
          a.href = "#" + p.slug;
          const r = ROUNDS[p.round];
          a.innerHTML = `
            <div class="row1">
              <span class="num">${String(visIdx + 1).padStart(2,"0")}.</span>
              <span class="pill ${r.pill}">${r.label}</span>
            </div>
            <div class="label">${p.name}</div>
            <div class="desc">${p.desc}</div>`;
          a.addEventListener("click", (e) => { e.preventDefault(); go(idx); aside.classList.remove("open"); });
          group.appendChild(a);
        });
        list.appendChild(group);
      });
      highlightActive();
    }

    let index = 0;

    function getInitialIndex(){
      const hash = location.hash.replace(/^#/, "");
      if (hash) {
        const i = PROTOTYPES.findIndex(p => p.slug === hash);
        if (i >= 0) return i;
        if (/^\d+$/.test(hash)) {
          const n = parseInt(hash,10) - 1;
          if (n>=0 && n<PROTOTYPES.length) return n;
        }
      }
      return 0;
    }

    function ensureValidIndex(){
      const visible = visiblePrototypes();
      if (visible.length === 0) return;
      if (!visible.includes(PROTOTYPES[index])) {
        const newIdx = PROTOTYPES.indexOf(visible[0]);
        go(newIdx);
      } else {
        highlightActive();
        updateCounter();
      }
    }

    function updateCounter(){
      const visible = visiblePrototypes();
      const visIdx = visible.indexOf(PROTOTYPES[index]);
      posEl.textContent = String(visIdx + 1);
      btnPrev.disabled = visIdx <= 0;
      btnNext.disabled = visIdx >= visible.length - 1;
    }

    function highlightActive(){
      list.querySelectorAll(".item").forEach(el => {
        el.classList.toggle("active", el.dataset.idx === String(index));
      });
      const active = list.querySelector(".item.active");
      if (active) active.scrollIntoView({block:"nearest"});
    }

    function go(i){
      index = Math.max(0, Math.min(PROTOTYPES.length - 1, i));
      const p = PROTOTYPES[index];
      const url = `${p.slug}/index.html`;
      frame.src = url;
      openDirect.href = url;
      metaTitle.textContent = p.name;
      metaCat.textContent = `${CATS[p.cat].label} · ${ROUNDS[p.round].label}`;
      metaSlug.textContent = p.slug;
      history.replaceState(null, "", `#${p.slug}`);
      document.title = `${p.name} — 프로토타입 뷰어`;
      updateCounter();
      highlightActive();
    }

    function step(delta){
      const visible = visiblePrototypes();
      const visIdx = visible.indexOf(PROTOTYPES[index]);
      const nextVis = Math.max(0, Math.min(visible.length - 1, visIdx + delta));
      go(PROTOTYPES.indexOf(visible[nextVis]));
    }

    btnPrev.addEventListener("click", () => step(-1));
    btnNext.addEventListener("click", () => step(1));
    btnSide.addEventListener("click", () => aside.classList.toggle("open"));

    document.addEventListener("keydown", (e) => {
      if (["INPUT","SELECT","TEXTAREA"].includes(e.target.tagName)) return;
      if (e.key === "ArrowLeft") { e.preventDefault(); step(-1); }
      else if (e.key === "ArrowRight") { e.preventDefault(); step(1); }
      else if (e.key === "Home") { e.preventDefault(); const v = visiblePrototypes(); if (v.length) go(PROTOTYPES.indexOf(v[0])); }
      else if (e.key === "End")  { e.preventDefault(); const v = visiblePrototypes(); if (v.length) go(PROTOTYPES.indexOf(v[v.length-1])); }
    });

    window.addEventListener("hashchange", () => go(getInitialIndex()));
    function checkResponsive(){
      btnSide.style.display = window.innerWidth <= 820 ? "inline-flex" : "none";
    }
    window.addEventListener("resize", checkResponsive);
    checkResponsive();

    renderFilters();
    renderList();
    index = getInitialIndex();
    go(index);
  </script>
</body>
</html>
