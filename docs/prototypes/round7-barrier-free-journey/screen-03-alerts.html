<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Barrier-Free Journey — 실시간 접근성 알림</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #060609; --surface: #0D0D13; --card: #13131A; --border: #1E1E28;
    --fg: #F4F4F8; --muted: #9898AC; --muted2: #5E5E72;
    --accent: #6366F1; --accent-soft: rgba(99,102,241,0.08);
    --red: #EF4444; --green: #22C55E; --yellow: #EAB308; --orange: #F97316;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--fg); font-family: 'Pretendard', system-ui, sans-serif; min-height: 100vh; display: flex; justify-content: center; padding: 20px 0 40px; }
  .phone { width: 390px; min-height: 844px; background: var(--surface); border-radius: 40px; overflow: hidden; box-shadow: 0 40px 80px rgba(0,0,0,0.7), 0 0 0 1px var(--border); }
  .status-bar { height: 44px; background: var(--surface); display: flex; align-items: center; justify-content: space-between; padding: 0 24px; font-size: 12px; font-weight: 600; }
  .status-icons { display: flex; gap: 6px; }
  .nav-bar { height: 52px; background: rgba(13,13,19,0.9); backdrop-filter: blur(16px); border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; padding: 0 20px; }
  .nav-back { width: 32px; height: 32px; border-radius: 50%; background: var(--card); display: flex; align-items: center; justify-content: center; cursor: pointer; border: 1px solid var(--border); text-decoration: none; color: var(--fg); font-size: 14px; flex-shrink: 0; }
  .nav-title { font-size: 16px; font-weight: 700; }
  .nav-step { margin-left: auto; font-size: 12px; color: var(--muted); }
  .progress { display: flex; justify-content: center; gap: 8px; padding: 14px 0; }
  .prog-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--border); transition: all 0.3s; }
  .prog-dot.done { background: rgba(34,197,94,0.6); }
  .prog-dot.active { background: var(--accent); width: 24px; border-radius: 4px; }

  /* Route status bar */
  .route-status { background: var(--card); border-bottom: 1px solid var(--border); padding: 12px 20px; display: flex; align-items: center; gap: 12px; }
  .route-badge { background: rgba(34,197,94,0.15); color: var(--green); font-size: 11px; font-weight: 700; padding: 4px 10px; border-radius: 20px; border: 1px solid rgba(34,197,94,0.3); }
  .route-name { font-size: 14px; font-weight: 600; }
  .route-dist { margin-left: auto; font-size: 12px; color: var(--muted); }
  .live-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); animation: pulse 1.5s ease-in-out infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.5; transform: scale(0.8); } }

  /* Alert feed */
  .content { padding: 16px 20px; }
  .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .section-title { font-size: 14px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
  .alert-count { background: var(--red); color: #fff; font-size: 10px; font-weight: 800; width: 20px; height: 20px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }

  .alert-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
  .alert-card { border-radius: 14px; padding: 14px 16px; border: 1px solid; position: relative; overflow: hidden; animation: slideIn 0.4s ease; }
  @keyframes slideIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
  .alert-card.critical { background: rgba(239,68,68,0.08); border-color: rgba(239,68,68,0.3); }
  .alert-card.warning { background: rgba(234,179,8,0.08); border-color: rgba(234,179,8,0.3); }
  .alert-card.info { background: rgba(99,102,241,0.06); border-color: rgba(99,102,241,0.2); }
  .alert-card.resolved { background: rgba(34,197,94,0.06); border-color: rgba(34,197,94,0.2); opacity: 0.7; }
  .alert-header { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 8px; }
  .alert-icon { font-size: 20px; flex-shrink: 0; line-height: 1; }
  .alert-title { font-size: 14px; font-weight: 700; }
  .alert-time { margin-left: auto; font-size: 10px; color: var(--muted2); white-space: nowrap; }
  .alert-body { font-size: 13px; color: var(--muted); line-height: 1.6; margin-bottom: 10px; }
  .alert-action { display: flex; gap: 8px; flex-wrap: wrap; }
  .action-btn { font-size: 12px; font-weight: 700; padding: 7px 14px; border-radius: 10px; border: none; cursor: pointer; font-family: inherit; transition: all 0.2s; }
  .action-primary { background: var(--accent); color: #fff; }
  .action-primary:hover { background: var(--accent-dim); }
  .action-secondary { background: var(--border); color: var(--fg); }
  .resolved-badge { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; color: var(--green); font-weight: 700; }

  /* Reroute panel */
  .reroute-panel { background: rgba(99,102,241,0.06); border: 1px solid rgba(99,102,241,0.25); border-radius: 14px; padding: 14px 16px; margin-bottom: 20px; display: none; }
  .reroute-panel.visible { display: block; }
  .reroute-label { font-size: 11px; font-weight: 700; color: var(--accent); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
  .reroute-compare { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .reroute-before, .reroute-after { background: var(--card); border-radius: 10px; padding: 12px; }
  .reroute-before { opacity: 0.6; position: relative; }
  .reroute-before::after { content: '취소됨'; position: absolute; top: 8px; right: 8px; font-size: 9px; font-weight: 700; background: rgba(239,68,68,0.2); color: var(--red); padding: 2px 6px; border-radius: 4px; }
  .reroute-tag { font-size: 10px; font-weight: 600; margin-bottom: 4px; }
  .reroute-val { font-size: 13px; font-weight: 700; }
  .reroute-sub { font-size: 11px; color: var(--muted); margin-top: 2px; }

  /* Live ticker */
  .live-ticker { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 12px 14px; margin-bottom: 16px; }
  .ticker-header { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .ticker-title { font-size: 12px; font-weight: 700; color: var(--muted); }
  .ticker-item { display: flex; align-items: center; gap: 8px; padding: 6px 0; border-bottom: 1px solid var(--border); }
  .ticker-item:last-child { border-bottom: none; padding-bottom: 0; }
  .ticker-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
  .ticker-text { font-size: 12px; color: var(--muted); }
  .ticker-badge { margin-left: auto; font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 20px; }

  /* CTA */
  .cta-row { padding: 16px 20px; display: flex; gap: 10px; }
  .btn-primary { flex: 2; padding: 16px; border-radius: 14px; border: none; background: var(--accent); color: #fff; font-size: 15px; font-weight: 800; cursor: pointer; font-family: inherit; }
  .btn-secondary { flex: 1; padding: 16px; border-radius: 14px; border: 1px solid var(--border); background: var(--card); color: var(--fg); font-size: 14px; font-weight: 600; cursor: pointer; font-family: inherit; }
</style>
</head>
<body>
<div class="phone">
  <div class="status-bar">
    <span id="clock">9:47</span>
    <span style="font-weight:800;color:var(--accent)">♿ BFJ</span>
    <div class="status-icons"><span>●●●</span><span>WiFi</span><span>88%</span></div>
  </div>
  <div class="nav-bar">
    <a href="screen-02-route.html" class="nav-back">←</a>
    <span class="nav-title">실시간 접근성 알림</span>
    <span class="nav-step">3 / 5</span>
  </div>
  <div class="progress">
    <div class="prog-dot done"></div>
    <div class="prog-dot done"></div>
    <div class="prog-dot active"></div>
    <div class="prog-dot"></div>
    <div class="prog-dot"></div>
  </div>

  <div class="route-status">
    <div class="live-dot"></div>
    <span class="route-badge">경복궁 정문 경로</span>
    <span class="route-name">접근성 점수 94</span>
    <span class="route-dist">1.2km · 진행 중</span>
  </div>

  <div class="content">
    <div class="section-header">
      <span class="section-title">실시간 알림</span>
      <span class="alert-count" id="alertCount">2</span>
    </div>

    <div class="alert-list" id="alertList">
      <!-- alerts rendered by JS -->
    </div>

    <div class="reroute-panel" id="reroutePanel">
      <div class="reroute-label">🔄 자동 우회 경로 업데이트됨</div>
      <div class="reroute-compare">
        <div class="reroute-before">
          <div class="reroute-tag" style="color:var(--red)">기존 경로</div>
          <div class="reroute-val">경복궁역 2번출구</div>
          <div class="reroute-sub">엘리베이터 → 지상</div>
          <div class="reroute-sub" style="color:var(--red);margin-top:6px">⚠️ 14:00~17:00 점검</div>
        </div>
        <div class="reroute-after">
          <div class="reroute-tag" style="color:var(--green)">우회 경로</div>
          <div class="reroute-val">경복궁역 5번출구</div>
          <div class="reroute-sub">엘리베이터 정상 운행</div>
          <div class="reroute-sub" style="color:var(--green);margin-top:6px">✅ +3분 추가</div>
        </div>
      </div>
    </div>

    <div class="live-ticker">
      <div class="ticker-header">
        <div class="live-dot"></div>
        <span class="ticker-title">경로 상 시설 현황</span>
      </div>
      <div class="ticker-item">
        <div class="ticker-dot" style="background:var(--green)"></div>
        <span class="ticker-text">경복궁역 5번 출구 엘리베이터</span>
        <span class="ticker-badge" style="background:rgba(34,197,94,0.15);color:var(--green)">정상</span>
      </div>
      <div class="ticker-item">
        <div class="ticker-dot" style="background:var(--red)"></div>
        <span class="ticker-text">경복궁역 2번 출구 엘리베이터</span>
        <span class="ticker-badge" style="background:rgba(239,68,68,0.15);color:var(--red)">점검중</span>
      </div>
      <div class="ticker-item">
        <div class="ticker-dot" style="background:var(--green)"></div>
        <span class="ticker-text">경복궁 정문 경사로</span>
        <span class="ticker-badge" style="background:rgba(34,197,94,0.15);color:var(--green)">이용가능</span>
      </div>
      <div class="ticker-item">
        <div class="ticker-dot" style="background:var(--yellow)"></div>
        <span class="ticker-text">북촌 메인 골목 보도</span>
        <span class="ticker-badge" style="background:rgba(234,179,8,0.15);color:var(--yellow)">혼잡</span>
      </div>
    </div>
  </div>

  <div class="cta-row">
    <button class="btn-secondary" onclick="window.location.href='screen-02-route.html'">← 경로</button>
    <button class="btn-primary" onclick="window.location.href='screen-04-spot.html'">목적지 정보 →</button>
  </div>
</div>

<script>
const alerts = [
  {
    type: 'critical',
    icon: '⚠️',
    title: '경복궁역 2번 출구 엘리베이터 점검',
    time: '방금',
    body: '오늘 14:00~17:00 정기 점검으로 운행 중단. 우회 경로(5번 출구)로 자동 업데이트됐습니다. 이동 시간 +3분.',
    actions: [
      { label: '우회 경로 확인', primary: true, cb: 'showReroute' },
      { label: '무시', primary: false, cb: 'dismissAlert' }
    ],
    id: 'a1', resolved: false
  },
  {
    type: 'warning',
    icon: '👥',
    title: '북촌한옥마을 주말 혼잡',
    time: '5분 전',
    body: '오전 10~11시 혼잡도 최고. 방문자 밀집으로 휠체어·유모차 이동 불편 예상. 오전 9시 이전 또는 오후 2시 이후 방문 권장.',
    actions: [
      { label: '혼잡도 보기', primary: false, cb: null },
    ],
    id: 'a2', resolved: false
  },
  {
    type: 'info',
    icon: '♿',
    title: '경복궁 장애인 전용 주차장 공간 확인',
    time: '12분 전',
    body: '현재 장애인 전용 구역 4자리 이용 가능 (총 8자리 중 4자리 여유). 정문 기준 50m 이내 위치.',
    actions: [],
    id: 'a3', resolved: false
  }
];

function renderAlerts() {
  const list = document.getElementById('alertList');
  list.innerHTML = '';
  let count = alerts.filter(a => !a.resolved && (a.type === 'critical' || a.type === 'warning')).length;
  document.getElementById('alertCount').textContent = count;

  alerts.forEach(a => {
    const div = document.createElement('div');
    div.className = 'alert-card ' + (a.resolved ? 'resolved' : a.type);
    div.id = 'alert-' + a.id;
    let actionsHtml = '';
    if (a.resolved) {
      actionsHtml = `<div class="resolved-badge">✅ 처리됨</div>`;
    } else {
      actionsHtml = a.actions.map(ac =>
        `<button class="action-btn ${ac.primary ? 'action-primary' : 'action-secondary'}" onclick="${ac.cb ? ac.cb + '(\''+a.id+'\')' : 'void(0)'}">${ac.label}</button>`
      ).join('');
    }
    div.innerHTML = `
      <div class="alert-header">
        <span class="alert-icon">${a.icon}</span>
        <span class="alert-title">${a.title}</span>
        <span class="alert-time">${a.time}</span>
      </div>
      <div class="alert-body">${a.body}</div>
      <div class="alert-action">${actionsHtml}</div>`;
    list.appendChild(div);
  });
}

function showReroute(id) {
  document.getElementById('reroutePanel').classList.add('visible');
  const a = alerts.find(x => x.id === id);
  if (a) { a.resolved = true; renderAlerts(); }
}

function dismissAlert(id) {
  const a = alerts.find(x => x.id === id);
  if (a) { a.resolved = true; renderAlerts(); }
}

// Live clock
function updateClock() {
  const now = new Date();
  document.getElementById('clock').textContent = now.getHours() + ':' + String(now.getMinutes()).padStart(2,'0');
}
updateClock(); setInterval(updateClock, 10000);

// Simulate new alert after 8 seconds
setTimeout(() => {
  alerts.unshift({
    type: 'info', icon: '🚻', title: '장애인 화장실 위치 안내',
    time: '지금',
    body: '다음 목적지(경복궁 정문) 200m 전, 장애인 전용 화장실 이용 가능. 운영 시간 09:00~18:00.',
    actions: [{ label: '지도에서 보기', primary: false, cb: null }],
    id: 'a4', resolved: false
  });
  renderAlerts();
}, 8000);

renderAlerts();
</script>
</body>
</html>
