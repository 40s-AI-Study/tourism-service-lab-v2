<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<title>Org</title>
<style>
  /* ---------- Paperclip design tokens ---------- */
  :root {
    --bg:           #09090B;         /* page background */
    --card:         #18181B;         /* card bg */
    --muted:        #27272A;         /* bot avatar bg */
    --border:       #27272A;         /* card border */
    --foreground:   #FAFAFA;
    --muted-fg:     #A1A1AA;         /* mente */
    --muted-fg-60:  rgba(161,161,170,0.6); /* adapter */
    --accent-live:  #0EA5E9;         /* 1 live indicator (optional) */
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body { background: var(--bg); }
  body {
    width: 1080px; height: 1920px;
    font-family: "Inter", -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Noto Sans KR", system-ui, sans-serif;
    color: var(--foreground);
    padding: 80px 100px;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 0;
  }

  /* ---------- Card (copied from Paperclip .bg-card border rounded-lg shadow-sm) ---------- */
  .card {
    width: 100%;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 0.5rem;       /* rounded-lg */
    box-shadow: 0 1px 2px 0 rgba(0,0,0,0.2); /* shadow-sm */
    display: flex; align-items: center;
    padding: 1.25rem 1.5rem;      /* px-6 py-5 — scaled up from px-4 py-3 */
    gap: 1rem;
  }

  .bot {
    flex-shrink: 0;
    width: 56px; height: 56px;    /* scaled from w-9 h-9 */
    border-radius: 9999px;
    background: var(--muted);
    display: flex; align-items: center; justify-content: center;
    color: rgba(250,250,250,0.7); /* text-foreground/70 */
  }
  .bot svg { width: 28px; height: 28px; stroke-width: 1.6; }

  .text {
    display: flex; flex-direction: column; align-items: flex-start;
    min-width: 0; flex: 1;
  }
  .name {
    font-size: 22px;              /* scaled from text-sm (14px) */
    font-weight: 600;
    line-height: 1.15;
    color: var(--foreground);
    letter-spacing: -0.005em;
  }
  .mente {
    font-size: 15px;              /* scaled from text-[11px] */
    line-height: 1.2;
    color: var(--muted-fg);
    margin-top: 4px;
  }
  .adapter {
    font-size: 13px;              /* scaled from text-[10px] */
    line-height: 1.2;
    color: var(--muted-fg-60);
    font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
    margin-top: 6px;
    letter-spacing: 0.01em;
  }

  /* ---------- Connector line between cards ---------- */
  .conn {
    width: 2px;
    height: 32px;
    background: var(--border);
  }

  /* SVG bot icon consistent with lucide lucide-bot */
  .bot-icon { stroke: currentColor; fill: none; stroke-linecap: round; stroke-linejoin: round; }
</style>
</head>
