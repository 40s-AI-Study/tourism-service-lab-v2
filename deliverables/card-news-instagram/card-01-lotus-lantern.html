<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Festival de Linternas de Loto - Seúl 2026</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1080px; height: 1350px; overflow: hidden; font-family: 'Helvetica Neue', Arial, sans-serif; }
  .card {
    width: 1080px; height: 1350px; position: relative;
    background: linear-gradient(170deg, #1a0533 0%, #2d1b69 30%, #e8475f 65%, #f9a825 100%);
    display: flex; flex-direction: column; justify-content: space-between;
    padding: 80px 70px;
  }
  .lanterns {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    overflow: hidden; pointer-events: none;
  }
  .lantern {
    position: absolute; width: 80px; height: 100px;
    border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
    opacity: 0.3;
  }
  .lantern:nth-child(1) { background: #ff6b6b; top: 5%; left: 10%; width: 90px; height: 110px; opacity: 0.25; }
  .lantern:nth-child(2) { background: #ffd93d; top: 8%; left: 35%; width: 70px; height: 85px; opacity: 0.2; }
  .lantern:nth-child(3) { background: #ff8a5c; top: 3%; left: 60%; width: 100px; height: 120px; opacity: 0.3; }
  .lantern:nth-child(4) { background: #ff6b9d; top: 10%; left: 82%; width: 75px; height: 90px; opacity: 0.2; }
  .lantern:nth-child(5) { background: #c9b1ff; top: 18%; left: 20%; width: 60px; height: 75px; opacity: 0.15; }
  .lantern:nth-child(6) { background: #ffd93d; top: 15%; left: 70%; width: 85px; height: 100px; opacity: 0.2; }
  .lantern::after {
    content: ''; position: absolute; bottom: -20px; left: 50%; transform: translateX(-50%);
    width: 2px; height: 20px; background: rgba(255,255,255,0.2);
  }
  .glow {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    background: radial-gradient(ellipse at 50% 25%, rgba(249,168,37,0.15) 0%, transparent 60%);
  }
  .top-section { position: relative; z-index: 2; }
  .badge {
    display: inline-block; background: rgba(255,255,255,0.15);
    backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.25);
    border-radius: 30px; padding: 12px 28px;
    font-size: 22px; color: #ffd93d; letter-spacing: 3px; text-transform: uppercase;
    font-weight: 600; margin-bottom: 30px;
  }
  .unesco-badge {
    display: inline-block; background: rgba(249,168,37,0.25);
    border: 1px solid rgba(249,168,37,0.5);
    border-radius: 20px; padding: 8px 20px;
    font-size: 18px; color: #ffd93d; letter-spacing: 1px;
    font-weight: 500; margin-bottom: 40px; margin-left: 15px;
  }
  .title {
    font-size: 72px; font-weight: 800; color: #fff;
    line-height: 1.15; letter-spacing: -1px;
    text-shadow: 0 4px 30px rgba(0,0,0,0.3);
    margin-bottom: 20px;
  }
  .subtitle {
    font-size: 32px; color: rgba(255,255,255,0.8);
    font-weight: 300; line-height: 1.4;
  }
  .middle-section {
    position: relative; z-index: 2;
    display: flex; gap: 20px; justify-content: center;
  }
  .info-pill {
    background: rgba(255,255,255,0.12); backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 20px; padding: 24px 32px;
    text-align: center; flex: 1;
  }
  .info-pill .icon { font-size: 36px; margin-bottom: 10px; }
  .info-pill .label { font-size: 18px; color: rgba(255,255,255,0.6); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 2px; }
  .info-pill .value { font-size: 26px; color: #fff; font-weight: 700; }
  .bottom-section { position: relative; z-index: 2; }
  .highlight-box {
    background: rgba(255,255,255,0.1); backdrop-filter: blur(15px);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 24px; padding: 35px 40px;
    margin-bottom: 30px;
  }
  .highlight-text {
    font-size: 28px; color: rgba(255,255,255,0.9); line-height: 1.6; font-weight: 300;
  }
  .highlight-text strong { color: #ffd93d; font-weight: 700; }
  .free-tag {
    display: inline-block; background: #ffd93d; color: #1a0533;
    border-radius: 16px; padding: 14px 40px;
    font-size: 28px; font-weight: 800; letter-spacing: 2px; text-transform: uppercase;
  }
  .branding {
    position: absolute; bottom: 30px; right: 70px;
    font-size: 16px; color: rgba(255,255,255,0.35); letter-spacing: 1px; z-index: 2;
  }
</style>
</head>
<body>
<div class="card">
  <div class="lanterns">
    <div class="lantern"></div><div class="lantern"></div><div class="lantern"></div>
    <div class="lantern"></div><div class="lantern"></div><div class="lantern"></div>
  </div>
  <div class="glow"></div>

  <div class="top-section">
    <span class="badge">Seúl 2026</span>
    <span class="unesco-badge">UNESCO</span>
    <h1 class="title">Festival de<br>Linternas<br>de Loto</h1>
    <p class="subtitle">연등회 · Yeon Deung Hoe</p>
  </div>

  <div class="middle-section">
    <div class="info-pill">
      <div class="icon">📅</div>
      <div class="label">Fecha</div>
      <div class="value">16–17 May</div>
    </div>
    <div class="info-pill">
      <div class="icon">📍</div>
      <div class="label">Lugar</div>
      <div class="value">Jongno</div>
    </div>
    <div class="info-pill">
      <div class="icon">🎫</div>
      <div class="label">Entrada</div>
      <div class="value">Gratis</div>
    </div>
  </div>

  <div class="bottom-section">
    <div class="highlight-box">
      <p class="highlight-text">
        Desfile nocturno con <strong>miles de linternas iluminadas</strong>.
        Patrimonio Inmaterial de la UNESCO con <strong>1.200 años</strong> de historia.
      </p>
    </div>
    <span class="free-tag">Entrada Gratuita</span>
  </div>

  <div class="branding">KoreaFestival Live · @visitkorea</div>
</div>
</body>
</html>
